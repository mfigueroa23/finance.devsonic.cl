name: "Release Finance Project"
on:
  push:
    branches:
      - main
permissions: {}
jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:

      - name: "Getting source code"
        uses: actions/checkout@v5

      - name: "Installing Node.Js"
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: "Installing dependencies"
        run: pnpm install --frozen-lockfile

      - name: "Building application"
        run: VITE_API_DOMAIN=${{ secrets.API_DOMAIN }} pnpm run build

      - name: "Extracting version"
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: "Uploading dist"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  package:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:

      - name: "Getting source code"
        uses: actions/checkout@v5

      - name: "Downloading dist"
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: "Setting up Docker"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "Setting up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Building and pushing Docker Image"
        run: |
          docker buildx build \
          --push --platform linux/amd64,linux/arm64 \
          --cache-from=type=gha --cache-to=type=gha,mode=max \
          -t ${{ secrets.DOCKER_USERNAME }}/finance.devsonic.cl:${{ needs.build.outputs.version }} .

  deployment:
    runs-on: ubuntu-latest
    needs: [build, package]
    permissions: {}
    steps:

      - name: "Setting up Twingate"
        uses: Twingate/github-action@v1.8
        with:
          service-key: ${{ secrets.DEVSONIC_SERVICE_KEY }}

      - name: "Update Kubernetes Deployment"
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          command: set image deployment/finance-devsonic-cl finance-devsonic-cl=${{ secrets.DOCKER_USERNAME }}/finance.devsonic.cl:${{ needs.build.outputs.version }} -n devsonic-cl

      - name: "Verify Deployment Rollout"
        uses: steebchen/kubectl@v2.1.1
        with:
          config: ${{ secrets.KUBE_CONFIG_DATA }}
          command: rollout status deployment/finance-devsonic-cl -n devsonic-cl
